<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            /* width: 700px;
            height: 700px; */
            background-color: pink;
            display: grid;
            grid-template-areas: 'nav1 nav1 nav1 nav1 nav1'
                                  'aside1 sec1 sec2 sec2 sec2'
                                  'aside1 sec3 sec3 sec3 sec3'
                                  'aside1 sec4 sec4 sec4 sec4'
                                  'foo foo foo foo foo';
        }
        .nav{
            background-color: red;
            height: 100px;
            grid-area: nav1;
        }
        .asideBar{
            background-color: blue;
            height: 90vh;
            grid-area: aside1;
        }
        .secOne{background-color: orange; grid-area: sec1;}
        .secTwo{background-color: rgb(64, 58, 46);grid-area: sec2;}
        .secThree{background-color: rgb(0, 255, 47); grid-area: sec3;}
        .secFour{background-color: rgb(55, 0, 255); grid-area: sec4;}
.footer{background-color: black;grid-area: foo; height: 40px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"></div>
        <div class="asideBar"></div>
        <div class="secOne"></div>
        <div class="secTwo"></div>
        <div class="secThree"></div>
        <div class="secFour"></div>
        <div class="footer"></div>

    </div>
</body>
</html>
